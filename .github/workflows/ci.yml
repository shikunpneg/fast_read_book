name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov

      - name: Smoke test
        run: |
          python -c "import kg_core; print('kg_core', kg_core.__version__)"
          python -c "from kg_core import KnowledgeGraphBuilder, clean_text, split_chapters; print('imports OK')"
          kg-build --help

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short || echo "no tests yet"
        continue-on-error: true
